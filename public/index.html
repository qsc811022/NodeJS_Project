<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunchBox Ordering System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>LunchBox Ordering System</h1>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <button type="button" id="logoutBtn" style="display:none">Logout</button>
    </form>
    <p id="welcome" style="display:none"></p>

    <form id="orderForm" style="display:none">
        <label for="menu">Menu Item:</label>
        <select id="menu"></select>

        <label for="note">Note:</label>
        <input type="text" id="note">

        <button type="submit">Submit Order</button>
    </form>

    <div id="menuAdmin" style="display:none">
        <h2>Create Menu</h2>
        <form id="menuForm">
            <input type="text" id="menuName" placeholder="Name" required>
            <input type="number" id="menuPrice" placeholder="Price" required>
            <input type="date" id="menuDate" required>
            <button type="submit">Add Menu</button>
        </form>
    </div>

    <h2>Orders</h2>
    <table id="ordersTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Menu</th>
                <th>Price</th>
                <th>Note</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>Today's Stats</h2>
    <table id="statsTable">
        <thead><tr><th>Menu</th><th>Qty</th><th>Total</th></tr></thead>
        <tbody></tbody>
    </table>
    <p id="summary"></p>

    <script src="script.js"></script>
</body>
</html>
